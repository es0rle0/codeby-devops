---
- name: MySQL | Install packages (Debian)
  become: true
  ansible.builtin.apt:
    name: "{{ mysql_packages_debian }}"
    state: present
    update_cache: true

- name: MySQL | Enable and start service (Debian)
  become: true
  ansible.builtin.service:
    name: "{{ mysql_service_debian }}"
    state: started
    enabled: true

# Создать БД WordPress
- name: MySQL | Create wordpress database (Debian)
  become: true
  community.mysql.mysql_db:
    name: "{{ wp_db_name }}"
    state: present
    login_user: root
    login_unix_socket: "{{ mysql_socket_debian }}"

# Создать пользователя WordPress и выдать права
- name: MySQL | Create wordpress user and grant privileges (Debian)
  become: true
  community.mysql.mysql_user:
    name: "{{ wp_db_user }}"
    password: "{{ wp_db_password }}"
    host: "{{ wp_db_host }}"
    priv: "{{ wp_db_name }}.*:ALL"
    state: present
    login_user: root
    login_unix_socket: "{{ mysql_socket_debian }}"
