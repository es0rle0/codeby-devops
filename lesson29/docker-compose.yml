services:
  # Reddit app (теперь из твоего GHCR)
  ui:
    image: ghcr.io/es0rle0/reddit-ui:monitoring
    container_name: reddit-ui
    ports:
      - "9292:9292"
    environment:
      - POST_SERVICE_HOST=post
      - POST_SERVICE_PORT=5000
      - COMMENT_SERVICE_HOST=comment
      - COMMENT_SERVICE_PORT=9292
    depends_on:
      - post
      - comment
    networks: [reddit]

  post:
    image: ghcr.io/es0rle0/reddit-post:monitoring
    container_name: reddit-post
    environment:
      - POST_DATABASE_HOST=post_db
      - POST_DATABASE_PORT=27017
    depends_on: [post_db]
    networks: [reddit]

  comment:
    image: ghcr.io/es0rle0/reddit-comment:monitoring
    container_name: reddit-comment
    environment:
      - COMMENT_DATABASE_HOST=comment_db
      - COMMENT_DATABASE_PORT=27017
    depends_on: [comment_db]
    networks: [reddit]

  post_db:
    image: mongo:4.4
    container_name: reddit-post-db
    volumes:
      - post_db:/data/db
    networks: [reddit]

  comment_db:
    image: mongo:4.4
    container_name: reddit-comment-db
    volumes:
      - comment_db:/data/db
    networks: [reddit]

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: monitoring-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [monitoring, reddit]

  blackbox:
    image: prom/blackbox-exporter:latest
    container_name: monitoring-blackbox
    command: ["--config.file=/etc/blackbox_exporter/config.yml"]
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"
    networks: [monitoring, reddit]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: monitoring-cadvisor
    privileged: true
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks: [monitoring]

  grafana:
    image: grafana/grafana:latest
    container_name: monitoring-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
    networks: [monitoring]

networks:
  reddit: {}
  monitoring: {}

volumes:
  post_db: {}
  comment_db: {}
  grafana_data: {}
