name: Lesson28 - Maven CI + Docker to GHCR

on:
  push:
    branches: [ "lesson28" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: "17"
  REGISTRY: ghcr.io

jobs:
  build_test:
    name: Build & Test (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [ hello-world, hello-jenkins, hello-devops ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Кэш Maven зависимостей (через setup-java) :contentReference[oaicite:2]{index=2}
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build + test (maven)
        run: mvn -B -f lesson26/apps/${{ matrix.app }}/pom.xml clean test package

      # Сохранение артефакта (jar)
      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.app }}
          path: lesson26/apps/${{ matrix.app }}/target/*.jar
          if-no-files-found: error

  docker_publish:
    name: Docker build & push (${{ matrix.app }})
    needs: build_test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [ hello-world, hello-jenkins, hello-devops ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-${{ matrix.app }}
          path: dist/${{ matrix.app }}

      - name: Prepare docker context
        run: |
          set -eux
          JAR="$(ls dist/${{ matrix.app }}/*.jar | head -n 1)"
          mv "$JAR" dist/${{ matrix.app }}/app.jar
          cp lesson28/Dockerfile.runtime dist/${{ matrix.app }}/Dockerfile
          ls -la dist/${{ matrix.app }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: dist/${{ matrix.app }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}-${{ matrix.app }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}-${{ matrix.app }}:${{ github.ref_name }}
