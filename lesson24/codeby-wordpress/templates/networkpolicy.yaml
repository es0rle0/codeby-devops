{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "codebywp.fullname" . }}-mysql-allow-only-wp
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: mysql
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: wordpress
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 3306
{{- end }}
