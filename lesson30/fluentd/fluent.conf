# Приём логов от Docker fluentd-logging-driver
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# --- UI: пишем в 3 индекса: raw + regexp + grok ---
<match reddit.ui>
  @type copy

  # raw (чтобы всегда было видно исходную строку)
  <store>
    @type elasticsearch
    host elasticsearch
    port 9200
    logstash_format true
    logstash_prefix reddit-ui-raw
    include_tag_key true
    tag_key tag
  </store>

  <store>
    @type relabel
    @label @REGEXP
  </store>

  <store>
    @type relabel
    @label @GROK
  </store>
</match>

# ---------- REGEXP parsing ----------
<label @REGEXP>
  <filter reddit.ui>
    @type parser
    key_name log
    reserve_data true
    remove_key_name_field true
    emit_invalid_record_to_error false

    # REGEXP под "apache combined" / access лог.
    <parse>
      @type regexp
      expression /^(?<clientip>\S+) \S+ \S+ \[(?<timestamp>[^\]]+)\] "(?<method>\S+) (?<path>\S+)(?: HTTP\/(?<http_version>[0-9.]+))?" (?<status>\d{3}) (?<bytes>\d+|-)(?: "(?<referrer>[^"]*)" "(?<agent>[^"]*)")?.*$/
      time_key timestamp
      time_format %d/%b/%Y:%H:%M:%S %z
    </parse>
  </filter>

  <match reddit.ui>
    @type elasticsearch
    host elasticsearch
    port 9200
    logstash_format true
    logstash_prefix reddit-ui-regexp
    include_tag_key true
    tag_key tag
  </match>
</label>

# ---------- GROK parsing ----------
<label @GROK>
  <filter reddit.ui>
    @type parser
    key_name log
    reserve_data true
    remove_key_name_field true
    emit_invalid_record_to_error false

    <parse>
      @type grok
      grok_pattern %{COMBINEDAPACHELOG}
      time_key timestamp
      time_format dd/MMM/yyyy:HH:mm:ss Z
    </parse>
  </filter>

  <match reddit.ui>
    @type elasticsearch
    host elasticsearch
    port 9200
    logstash_format true
    logstash_prefix reddit-ui-grok
    include_tag_key true
    tag_key tag
  </match>
</label>

# post/comment — складываем сырыми
<match reddit.post>
  @type elasticsearch
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix reddit-post-raw
  include_tag_key true
  tag_key tag
</match>

<match reddit.comment>
  @type elasticsearch
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix reddit-comment-raw
  include_tag_key true
  tag_key tag
</match>
