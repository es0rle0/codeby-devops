services:
  # ----------------------
  # Reddit app (logging)
  # ----------------------
  ui:
    image: ghcr.io/codeby-devops/ui:logging
    container_name: reddit-ui
    ports:
      - "9292:9292"
    environment:
      - POST_SERVICE_HOST=post
      - POST_SERVICE_PORT=5000
      - COMMENT_SERVICE_HOST=comment
      - COMMENT_SERVICE_PORT=9292
    depends_on:
      - post
      - comment
      - fluentd
    networks: [reddit]
    logging:
      driver: fluentd
      options:
        fluentd-address: "127.0.0.1:24224"
        tag: "reddit.ui"

  post:
    image: ghcr.io/codeby-devops/post:logging
    container_name: reddit-post
    environment:
      - POST_DATABASE_HOST=post_db
      - POST_DATABASE_PORT=27017
    depends_on: [post_db, fluentd]
    networks: [reddit]
    logging:
      driver: fluentd
      options:
        fluentd-address: "127.0.0.1:24224"
        tag: "reddit.post"

  comment:
    image: ghcr.io/codeby-devops/comment:logging
    container_name: reddit-comment
    environment:
      - COMMENT_DATABASE_HOST=comment_db
      - COMMENT_DATABASE_PORT=27017
    depends_on: [comment_db, fluentd]
    networks: [reddit]
    logging:
      driver: fluentd
      options:
        fluentd-address: "127.0.0.1:24224"
        tag: "reddit.comment"

  post_db:
    image: mongo:4.4
    container_name: reddit-post-db
    volumes:
      - post_db:/data/db
    networks: [reddit]

  comment_db:
    image: mongo:4.4
    container_name: reddit-comment-db
    volumes:
      - comment_db:/data/db
    networks: [reddit]

  # ----------------------
  # EFK stack
  # ----------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: logging-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks: [logging]

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: logging-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on: [elasticsearch]
    ports:
      - "5601:5601"
    networks: [logging]

  fluentd:
    build: ./fluentd
    container_name: logging-fluentd
    depends_on: [elasticsearch]
    ports:
      - "24224:24224"
    networks: [logging, reddit]
    restart: unless-stopped

networks:
  reddit: {}
  logging: {}

volumes:
  post_db: {}
  comment_db: {}
  esdata: {}
